name: Security and build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:security
      - run: pnpm audit --prod --audit-level high
      - run: pnpm run build
      - name: Check Cloudflare Functions syntax
        shell: bash
        run: find functions -type f -name '*.js' -print0 | xargs -0 -n1 node --check
